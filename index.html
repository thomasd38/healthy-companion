<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Healthy Companion</title>
    <meta name="description" content="Application simple et saine pour le suivi du poids et des repas.">
    
    <!-- Google Fonts: Inter pour une typographie moderne, lisible et apaisante -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="app-header">
        <div class="logo">
            <h1>Healthy Companion</h1>
        </div>
        <button id="theme-toggle" class="btn-icon" aria-label="Changer de thème">
            <!-- Icône lune/soleil gérée via CSS/JS -->
            <svg id="icon-sun" class="icon hidden" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
            <svg id="icon-moon" class="icon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
        </button>
    </header>

    <main class="dashboard container">
        <section class="dashboard-header">
            <h2>Aujourd'hui</h2>
            <p class="subtitle">Voici un résumé de votre journée.</p>
        </section>

        <div class="grid-layout">
            <!-- Widget Calories -->
            <article class="card widget">
                <div class="card-header">
                    <h3>Calories</h3>
                </div>
                <div class="card-body">
                    <div class="main-stat">
                        <span class="value">0</span>
                        <span class="unit">/ 2000 kcal</span>
                    </div>
                    <div class="progress-bar-container">
                        <div class="progress-bar" style="width: 0%;"></div>
                    </div>
                </div>
            </article>

            <!-- Widget Poids -->
            <article class="card widget">
                <div class="card-header">
                    <h3>Poids Actuel</h3>
                </div>
                <div class="card-body">
                    <div class="main-stat">
                        <span class="value">--</span>
                        <span class="unit">kg</span>
                    </div>
                    <p class="trend muted">En attente de données</p>
                </div>
            </article>

            <!-- Widget Repas -->
            <article class="card widget widget-meals">
                <div class="card-header">
                    <h3>Menu du jour</h3>
                </div>
                <div class="card-body">
                    <ul class="meal-list">
                        <li class="meal-item empty">Aucun repas planifié</li>
                    </ul>
                </div>
            </article>
        </div>
    </main>

    <script src="app.js"></script>
</body>
</html>
